---
name: "Pull Request: Validate"

on:
  pull_request:
    branches: ["master"]
    types: ["opened", "synchronize", "reopened"]

concurrency:
  group: ${{ github.head_ref }}-pr-validate
  cancel-in-progress: true

jobs:
  simple-checks:
    uses: drag0n141/containers/.github/workflows/simple-checks.yaml@ea189114e22a66c73716502f08975ea9aeffb360 # master

  get-changed-images:
    uses: drag0n141/containers/.github/workflows/get-changed-images.yaml@ea189114e22a66c73716502f08975ea9aeffb360 # master

  build-images:
    needs: ["simple-checks", "get-changed-images"]
    if: ${{ needs.get-changed-images.outputs.addedOrModified == 'true' }}
    uses: drag0n141/containers/.github/workflows/build-images.yaml@ea189114e22a66c73716502f08975ea9aeffb360 # master
    secrets: inherit
    with:
      appsToBuild: "${{ needs.get-changed-images.outputs.addedOrModifiedImages }}"
      pushImages: false
      sendNotifications: false
